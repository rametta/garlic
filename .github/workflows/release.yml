# Build Garlic for macOS (Apple Silicon + Intel), then attach bundles to a GitHub Release.
#
# How to release (recommended):
#   1. Bump the version in package.json, src-tauri/tauri.conf.json, and src-tauri/Cargo.toml
#      (keep them identical SemVer strings, e.g. 0.2.0).
#   2. Commit and push.
#   3. Create and push an annotated tag whose name is v + that version:
#        git tag -a v0.2.0 -m "Release v0.2.0"
#        git push origin v0.2.0
#   The workflow strips the leading "v" and writes the version into the manifests
#   before building so installers always match the tag, even if a step was missed locally.
#
# Tag push is the usual trigger for app releases: it is explicit, maps cleanly to SemVer,
# and matches how GitHub Releases are tied to git tags.
#
# macOS signing + notarization (see https://v2.tauri.app/distribute/sign/macos/ ):
#   APPLE_CERTIFICATE              base64 .p12 (openssl base64 -A -in cert.p12 -out -)
#   APPLE_CERTIFICATE_PASSWORD     .p12 export password
#   (Tauri imports the .p12 and passes codesign --keychain; do not rely on manual security import.)
#   APPLE_API_ISSUER               App Store Connect API issuer ID
#   APPLE_API_KEY                  API Key ID (short id from the key row, not the .p8 contents)
#   APP_STORE_CONNECT_PRIVATE_KEY  full contents of the downloaded .p8 private key
#
# Caches: Bun download cache (bun.lock) + Rust deps/target (src-tauri/Cargo.lock) via rust-cache.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  publish-tauri:
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"

    steps:
      - uses: actions/checkout@v6

      - name: Version from tag
        run: |
          if [[ "${GITHUB_REF_NAME}" != v* ]]; then
            echo "Expected tag to start with v (e.g. v0.2.0), got: ${GITHUB_REF_NAME}"
            exit 1
          fi
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Sync version into manifests
        run: |
          python <<'PY'
          import json
          import os
          import pathlib
          import re

          ver = os.environ["VERSION"]
          root = pathlib.Path(".")
          for name in ("package.json", "src-tauri/tauri.conf.json"):
              p = root / name
              data = json.loads(p.read_text())
              data["version"] = ver
              p.write_text(json.dumps(data, indent=2) + "\n")
          cargo_path = root / "src-tauri/Cargo.toml"
          cargo = cargo_path.read_text()
          cargo_new = re.sub(
              r'^version = "[^"]*"',
              f'version = "{ver}"',
              cargo,
              count=1,
              flags=re.M,
          )
          cargo_path.write_text(cargo_new)
          PY

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust (Cargo registry, git deps, target/)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cache Bun package downloads
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Write App Store Connect API key
        env:
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          API_KEY_PATH="${{ runner.temp }}/AuthKey.p8"
          printf '%s\n' "$APP_STORE_CONNECT_PRIVATE_KEY" > "$API_KEY_PATH"
          chmod 600 "$API_KEY_PATH"
          test -s "$API_KEY_PATH"
          echo "APPLE_API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Garlic ${{ github.ref_name }}
          releaseBody: "Installers and bundles for this version are attached below."
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          args: ${{ matrix.args }}
          tauriScript: bun run tauri
