[[permission]]
identifier = "allow-get-repo-metadata"
description = "Allows reading Git metadata, branch lists, commit log, working tree, staging, commit, and checkout."
commands.allow = [
  "reset_main_window_title",
  "get_repo_metadata",
  "list_local_branches",
  "list_remote_branches",
  "list_branch_commits",
  "list_graph_commits",
  "checkout_local_branch",
  "create_local_branch",
  "create_branch_at_commit",
  "create_branch_from_remote",
  "delete_local_branch",
  "rebase_current_branch_onto",
  "list_working_tree_files",
  "stage_paths",
  "unstage_paths",
  "commit_staged",
  "get_staged_diff",
  "get_unstaged_diff",
  "list_commit_files",
  "get_commit_signature_status",
  "get_commit_file_diff",
  "pull_local_branch",
  "push_to_origin",
  "list_stashes",
  "stash_push",
  "stash_pop",
  "stash_drop",
  "restore_app_bootstrap",
  "set_last_repo_path",
  "set_theme",
]
